version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mini_sdr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdr_user
      POSTGRES_PASSWORD: sdr_password
      POSTGRES_DB: mini_sdr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdr_user -d mini_sdr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sdr_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mini_sdr_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://sdr_user:sdr_password@postgres:5432/mini_sdr_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - sdr_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mini_sdr_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sdr_network

volumes:
  postgres_data:
    driver: local

networks:
  sdr_network:
    driver: bridge
